version: "3.9"
services:
  ai-demand:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    environment:
      AI_OFBIZ_BASE_DIR: /data/ofbiz
      AI_API_KEY: ${AI_API_KEY:-change-me}
      AI_WINDOW_DAYS: 30
    volumes:
      - ./ofbiz-framework:/data/ofbiz:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
